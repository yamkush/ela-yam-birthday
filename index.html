<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יום הולדת</title>
    <script src="config.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&family=Rubik+Bubbles&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Heebo', sans-serif;
            background: #0a0a2e;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Animated background */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0.6;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-10vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Confetti */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confetti-fall linear infinite;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0.3;
            }
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
        }

        /* Title - Green */
        .title {
            font-family: 'Rubik Bubbles', 'Heebo', sans-serif;
            font-size: clamp(3rem, 8vw, 7rem);
            color: #00ff66;
            text-shadow:
                0 0 20px rgba(0, 255, 102, 0.5),
                0 0 40px rgba(0, 255, 102, 0.3),
                0 0 80px rgba(0, 255, 102, 0.1);
            margin-bottom: 1rem;
            animation: glow-green 2s ease-in-out infinite alternate;
        }

        @keyframes glow-green {
            from {
                text-shadow:
                    0 0 20px rgba(0, 255, 102, 0.5),
                    0 0 40px rgba(0, 255, 102, 0.3);
            }
            to {
                text-shadow:
                    0 0 30px rgba(0, 255, 102, 0.7),
                    0 0 60px rgba(0, 255, 102, 0.5),
                    0 0 100px rgba(0, 255, 102, 0.2);
            }
        }

        /* Subtitle - Yellow/Olive */
        .subtitle {
            font-family: 'Rubik Bubbles', 'Heebo', sans-serif;
            font-size: clamp(2rem, 5vw, 4.5rem);
            color: #c8b400;
            text-shadow:
                0 0 15px rgba(200, 180, 0, 0.5),
                0 0 30px rgba(200, 180, 0, 0.3);
            margin-bottom: 2rem;
            animation: glow-yellow 2s ease-in-out infinite alternate;
            animation-delay: 0.5s;
        }

        @keyframes glow-yellow {
            from {
                text-shadow:
                    0 0 15px rgba(200, 180, 0, 0.5),
                    0 0 30px rgba(200, 180, 0, 0.3);
            }
            to {
                text-shadow:
                    0 0 25px rgba(200, 180, 0, 0.7),
                    0 0 50px rgba(200, 180, 0, 0.5);
            }
        }

        /* Date - Red */
        .date {
            font-family: 'Rubik Bubbles', 'Heebo', sans-serif;
            font-size: clamp(2.5rem, 6vw, 5.5rem);
            color: #ff2200;
            text-shadow:
                0 0 20px rgba(255, 34, 0, 0.5),
                0 0 40px rgba(255, 34, 0, 0.3);
            margin-bottom: 2rem;
            animation: pulse-red 1.5s ease-in-out infinite;
        }

        @keyframes pulse-red {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        /* Bottom text - Purple */
        .bottom-text {
            font-family: 'Rubik Bubbles', 'Heebo', sans-serif;
            font-size: clamp(1.8rem, 4vw, 3.5rem);
            color: #6633ff;
            text-shadow:
                0 0 15px rgba(102, 51, 255, 0.5),
                0 0 30px rgba(102, 51, 255, 0.3);
            margin-top: 1rem;
            animation: glow-purple 2s ease-in-out infinite alternate;
            animation-delay: 1s;
        }

        @keyframes glow-purple {
            from {
                text-shadow:
                    0 0 15px rgba(102, 51, 255, 0.5),
                    0 0 30px rgba(102, 51, 255, 0.3);
            }
            to {
                text-shadow:
                    0 0 25px rgba(102, 51, 255, 0.7),
                    0 0 50px rgba(102, 51, 255, 0.5);
            }
        }

        /* Countdown */
        .countdown {
            display: flex;
            gap: 1.5rem;
            margin: 2.5rem 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .countdown-item {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 1.2rem 1.8rem;
            min-width: 100px;
            transition: transform 0.3s;
        }

        .countdown-item:hover {
            transform: scale(1.1);
        }

        .countdown-number {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00ff66, #c8b400, #ff2200, #6633ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-shift 4s ease infinite;
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .countdown-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 0.3rem;
        }

        /* Decorative elements */
        .emoji-row {
            font-size: 2rem;
            margin: 1rem 0;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Avatar */
        .avatars-row {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            justify-content: center;
            margin: 1.5rem 0;
        }

        .avatar-wrap {
            display: block;
            animation: bounce 2s ease-in-out infinite;
            animation-delay: 0.3s;
            text-decoration: none;
            cursor: pointer;
            color: inherit;
        }

        .avatar-wrap:nth-child(2) {
            animation-delay: 0.6s;
        }

        .avatar-wrap img {
            width: 140px;
            height: 140px;
            image-rendering: pixelated;
            border-radius: 20px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            transition: transform 0.3s;
        }

        .avatar-wrap img:hover {
            transform: scale(1.15) rotate(5deg);
        }

        .avatar-name {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 0.4rem;
            text-align: center;
            letter-spacing: 2px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .countdown {
                gap: 0.8rem;
            }
            .countdown-item {
                min-width: 70px;
                padding: 0.8rem 1rem;
            }
            .countdown-number {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-particles" id="particles"></div>

    <div class="container">
        <div class="emoji-row" id="topEmojis"></div>

        <div class="avatars-row">
            <a href="game.html" class="avatar-wrap">
                <img id="avatar" src="" alt="ELA">
                <div class="avatar-name">ELA</div>
            </a>
            <a href="game.html" class="avatar-wrap">
                <img id="yamAvatar" src="" alt="YAM">
                <div class="avatar-name">YAM</div>
            </a>
        </div>

        <h1 class="title" id="title"></h1>

        <h2 class="subtitle" id="subtitle"></h2>

        <div class="date" id="dateText"></div>

        <div class="countdown" id="countdown">
            <div class="countdown-item">
                <div class="countdown-number" id="days">--</div>
                <div class="countdown-label">ימים</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-number" id="hours">--</div>
                <div class="countdown-label">שעות</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-number" id="minutes">--</div>
                <div class="countdown-label">דקות</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-number" id="seconds">--</div>
                <div class="countdown-label">שניות</div>
            </div>
        </div>

        <p class="bottom-text" id="bottomText"></p>

        <div class="emoji-row" id="bottomEmojis"></div>
    </div>

    <script>
        // Apply config to page
        document.title = CONFIG.pageTitle;
        document.getElementById('title').textContent = CONFIG.title;
        document.getElementById('subtitle').textContent = CONFIG.subtitle;
        document.getElementById('dateText').textContent = CONFIG.dateText;
        document.getElementById('bottomText').textContent = CONFIG.bottomText;
        document.getElementById('avatar').src = CONFIG.avatarSrc;
        document.getElementById('yamAvatar').src = CONFIG.yamAvatarSrc;
        document.getElementById('topEmojis').textContent = CONFIG.topEmojis;
        document.getElementById('bottomEmojis').textContent = CONFIG.bottomEmojis;

        // Countdown
        const targetDate = new Date(CONFIG.countdownDate + 'T00:00:00');

        function updateCountdown() {
            const now = new Date();
            const diff = targetDate - now;

            if (diff <= 0) {
                document.getElementById('days').textContent = '🎉';
                document.getElementById('hours').textContent = '🥳';
                document.getElementById('minutes').textContent = '🎊';
                document.getElementById('seconds').textContent = '🎈';
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = days;
            document.getElementById('hours').textContent = hours;
            document.getElementById('minutes').textContent = minutes;
            document.getElementById('seconds').textContent = seconds;
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);

        // Create floating particles
        const particlesContainer = document.getElementById('particles');
        const colors = ['#00ff66', '#c8b400', '#ff2200', '#6633ff', '#ff69b4', '#00bfff'];

        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 12 + 4;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.background = colors[Math.floor(Math.random() * colors.length)];
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (Math.random() * 8 + 6) + 's';
            particle.style.animationDelay = (Math.random() * 10) + 's';
            particlesContainer.appendChild(particle);
        }

        // Create confetti pieces
        const confettiColors = ['#00ff66', '#c8b400', '#ff2200', '#6633ff', '#ff69b4', '#ffd700'];
        for (let i = 0; i < 25; i++) {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            confetti.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            confetti.style.width = (Math.random() * 8 + 5) + 'px';
            confetti.style.height = (Math.random() * 8 + 5) + 'px';
            confetti.style.animationDuration = (Math.random() * 5 + 4) + 's';
            confetti.style.animationDelay = (Math.random() * 8) + 's';
            particlesContainer.appendChild(confetti);
        }
    </script>
</body>
</html>
